# This is a basic workflow to help you get started with Actions

name: dev workflow

# Controls when the action will run.
on:
  # Triggers the workflow on push or pull request events but only for the master branch
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "test"
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.10"
            tox-envs: py310-django52
          - python-version: "3.11"
            tox-envs: py311-django52
          - python-version: "3.12"
            tox-envs: py312-django52,py312-django60,lint,build
          - python-version: "3.13"
            tox-envs: py313-django52,py313-django60
          - python-version: "3.14"
            tox-envs: py314-django52,py314-django60
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --extra test --extra dev --frozen

      - name: test with tox
        run: uv run tox -e ${{ matrix.tox-envs }}

      - uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: false
          files: coverage.xml
